name: Brics
options:
  bundleIdPrefix: com.brics
  deploymentTarget:
    iOS: "17.0"
targets:
  Brics:
    type: application
    platform: iOS
    sources: [Brics]
    settings:
      base:
        SWIFT_VERSION: 5.10
        PRODUCT_BUNDLE_IDENTIFIER: com.brics.app
    info:
      path: Brics/App/Info.plist
      properties:
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSAppTransportSecurity:
          NSExceptionDomains:
            localhost:
              NSExceptionAllowsInsecureHTTPLoads: true
    dependencies:
      - framework: SpriteKit.framework
        embed: false

  BricsTests:
    type: bundle.unit-test
    platform: iOS
    sources: [BricsTests]
    settings:
      base:
        SWIFT_VERSION: 5.10
        PRODUCT_BUNDLE_IDENTIFIER: com.brics.tests
    dependencies:
      - target: Brics
